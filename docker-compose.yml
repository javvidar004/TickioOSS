services:
  backend:
    build: ./Backend
    container_name: contenedor_flask
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./Backend:/app

  frontend:
    build: ./Frontend 
    container_name: contenedor_frontend
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - ./Frontend:/app
    depends_on:
      backend:
        condition: service_healthy