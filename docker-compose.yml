version: "3.9"

services:
  db:
    build: ./DB
    environment:
      POSTGRES_USER: tickio_user
      POSTGRES_PASSWORD: tickio_pass
      POSTGRES_DB: tickio_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tickio_user -d tickio_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./Backend
    container_name: contenedor_backend
    environment:
      DATABASE_URL: postgresql://tickio_user:tickio_pass@db:5432/tickio_db
      SECRET_KEY: change-this-in-production-please
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./Backend:/app
    restart: unless-stopped

  frontend:
    build: ./Frontend
    container_name: contenedor_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
